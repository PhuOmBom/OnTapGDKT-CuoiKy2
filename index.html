<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập GDKT & PL 12 - Giữa Kỳ 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1565C0;
            /* Blue 800 */
            --primary-light: #42A5F5;
            /* Blue 400 */
            --primary-dark: #0D47A1;
            --accent-color: #90CAF9;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --text-secondary: #666;
            --correct-color: #d4edda;
            --correct-text: #155724;
            --wrong-color: #f8d7da;
            --wrong-text: #721c24;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--primary-color);
            color: white;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
        }

        header p {
            margin: 5px 0 0;
            font-weight: 300;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 20px;
            background: #e0e0e0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .tab-btn.active {
            background: var(--primary-light);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-light);
        }

        .info-card h3 {
            margin-top: 0;
            color: var(--primary-dark);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress {
            height: 100%;
            background-color: var(--primary-light);
            transition: width 0.3s ease;
        }

        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .question-card:hover {
            transform: translateY(-2px);
        }

        .question-text {
            font-weight: 500;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        @media (min-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .option-btn {
            padding: 12px 15px;
            background: #f5f5f5;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 1rem;
            position: relative;
            user-select: none;
        }

        .option-btn:hover {
            background: #e8e8e8;
        }

        .option-btn.selected {
            border-color: var(--primary-light);
            background: #e8f5e9;
        }

        .option-btn.correct {
            background: var(--correct-color);
            color: var(--correct-text);
            border-color: var(--correct-text);
        }

        .option-btn.incorrect {
            background: var(--wrong-color);
            color: var(--wrong-text);
            border-color: var(--wrong-text);
        }

        /* Part 2 specific */
        .tf-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .tf-row:last-child {
            border-bottom: none;
        }

        .tf-statement {
            flex: 1;
            padding-right: 15px;
        }

        .tf-options {
            display: flex;
            gap: 5px;
        }

        .tf-btn {
            padding: 5px 15px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            border-radius: 4px;
            min-width: 60px;
        }

        .tf-btn.selected-true {
            background: var(--primary-light);
            color: white;
            border-color: var(--primary-dark);
        }

        .tf-btn.selected-false {
            background: #ef5350;
            color: white;
            border-color: #c62828;
        }

        .tf-result {
            font-weight: bold;
            margin-left: 10px;
            min-width: 30px;
        }

        .correct-text {
            color: var(--primary-dark);
        }

        .wrong-text {
            color: #d32f2f;
        }

        .explanation {
            font-size: 0.9rem;
            color: #555;
            margin-top: 5px;
            font-style: italic;
        }

        /* Toast */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 2px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 17px;
        }

        .toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }

            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }

            to {
                bottom: 0;
                opacity: 0;
            }
        }

        /* Feedback Overlay */
        .feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .feedback-overlay.active {
            display: flex;
        }

        .feedback-img {
            max-width: 80%;
            max-height: 80%;
            width: auto;
            height: auto;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.1s ease-out;
        }

        .feedback-img.show {
            opacity: 1;
            transform: scale(1);
            animation: fadeOutEffect 0.36s forwards;
        }

        /* For finished state, we might want different behavior */
        .feedback-overlay.finished .feedback-img {
            animation: none;
            opacity: 1;
            transform: scale(1);
        }

        @keyframes fadeOutEffect {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(1.1);
            }
        }
    </style>
</head>

                        "explanation": "",
                        "ans": false
                    }
                ]
            },
            {
                "id": 70,
                "title": "Câu 70",
                "text": "Trong những năm qua, nhà sưu tầm cổ vật N đã sưu tầm được hàng ngàn cổ vật, trong đó có nhiều cổ vật quý hiếm, có giá trị lớn về văn hoá, lịch sử. Phần lớn các cổ vật này được ông lựa chọn để trao tặng cho các bảo tàng, trường đại học để phục vụ trưng bày và giảng dạy. Số còn lại được ông trưng bày tại nhà hàng của mình ở một địa điểm du lịch để phục vụ du khách tham quan miễn phí.<br>Đọc đoạn thông tin sau:<br>Năm 2021, Chùa Đậu – di tích lịch sử được mệnh danh là “Danh lam đệ nhất. trời Nam\" bỗng nhiên bị làm mới. Công trình hàng nghìn năm tuổi với nhiều hạng mục được xây thêm, làm mới khiến nhiều người chua xót: Chùa Đậu giờ chỉ còn 1 năm tuổi, nhưng có người lại cho rằng, chỉ vài năm nữa, rêu xanh sẽ mọc lên vì các hạng mục được xây mới, sửa chữa sẽ lại nhuốm màu cổ kính như xưa. Cả chuyện của Chùa Đậu được làm mới vốn không mới, nhưng lại xảy ra thưởng xuyên tại hầu hết các địa phương trong cả nước.",
                "items": [
                    {
                        "id": "a",
                        "text": "a) Với việc làm mới, Chùa Đậu chỉ mất đi vẻ cổ kính, nhưng thực tế vẫn được lịch sử hàng nghìn năm.",
                        "explanation": "",
                        "ans": false
                    },
                    {
                        "id": "b",
                        "text": "b) Công dân thực hiện quyền và nghĩa vụ bảo vệ di sản văn hoá bằng cách tranh cãi về việc nên/không nên làm mới các di tích lịch sử.",
                        "explanation": "",
                        "ans": false
                    },
                    {
                        "id": "c",
                        "text": "c) Nhiều hạng mục được xây thêm và làm mới khiến Chùa Đậu mất đi vẻ cổ kinh là dấu hiệu công dân lạm dụng quyền về bảo vệ di sản văn hoá.",
                        "explanation": "",
                        "ans": true
                    },
                    {
                        "id": "d",
                        "text": "d) Xử lí hành vi làm mới ở di tích lịch sử Chùa Đậu sẽ ngăn chặn được hiện tượng này ở hầu hết các địa phương khác.",
                        "explanation": "",
                        "ans": true
                    }
                ]
            }
        ];


        // DOM Elements
        const questionsPart1 = document.getElementById('questions-part1');
        const questionsPart2 = document.getElementById('questions-part2');
        const scorePart1 = document.getElementById('score-part1');
        const totalPart1 = document.getElementById('total-part1');
        const progressPart1 = document.getElementById('progress-part1');
        const scorePart2 = document.getElementById('score-part2');
        const totalPart2 = document.getElementById('total-part2');
        const progressPart2 = document.getElementById('progress-part2');

        // State
        let state = {
            part1: { correct: 0, total: 0, answered: 0 },
            part2: { score: 0, total: 0, answered: 0 }
        };

        // Assets
        const assets = {
            goodImgs: ['Good1.png', 'Good2.png', 'Good3.png', 'Good4.png', 'good36.jpg'],
            wrongImgs: ['Wrong1.png', 'Wrong2.png', 'Wrong3.png', 'Wrong4.png', 'Wrong5.png', 'Wrong6.png'],
            goodSfx: ['Good.mp3'], // Generic good sound
            wrongSfx: ['Wrong1.mp3', 'Wrong2.mp3']
        };

        function playRandomSfx(isCorrect) {
            const list = isCorrect ? assets.goodSfx : assets.wrongSfx;
            const rand = list[Math.floor(Math.random() * list.length)];
            const audio = new Audio(`sfx/${rand}`);
            audio.play().catch(e => console.log('Audio play failed:', e));
        }

        function showFeedbackImage(isCorrect) {
            const list = isCorrect ? assets.goodImgs : assets.wrongImgs;
            const rand = list[Math.floor(Math.random() * list.length)];
            const overlay = document.getElementById('feedback-overlay');
            const img = document.getElementById('feedback-img');

            img.src = `pics/${rand}`;
            overlay.className = 'feedback-overlay active';
            img.className = 'feedback-img show'; // Triggers animation

            // Hide after 0.36s (animation duration)
            setTimeout(() => {
                overlay.className = 'feedback-overlay';
                img.className = 'feedback-img';
            }, 360);
        }

        function showFinished() {
            const overlay = document.getElementById('feedback-overlay');
            const img = document.getElementById('feedback-img');

            img.src = `pics/Finished.png`;
            overlay.className = 'feedback-overlay active finished';
            // img.className = 'feedback-img show'; // No fade out animation for finished, just show

            const audio = new Audio(`sfx/Good.mp3`);
            audio.play().catch(e => console.log('Audio play failed:', e));

            setTimeout(() => {
                overlay.classList.remove('active', 'finished');
            }, 3000);
        }

        function checkCompletion() {
            // Check if total answered equals total questions
            // Note: part1.total is number of questions. part2.total is number of TF items.
            // part1.answered and part2.answered are counts of user answers.
            if (state.part1.answered === state.part1.total && state.part2.answered === state.part2.total) {
                setTimeout(showFinished, 500); // Small delay after last answer feedback
            }
        }

        function init() {
            // Setup Part 1
            if (typeof part1Data !== 'undefined' && part1Data.length > 0) {
                state.part1.total = part1Data.length;
                renderPart1();
            } else {
                questionsPart1.innerHTML = "<p style='text-align:center'>Đang tải dữ liệu câu hỏi...</p>";
            }

            // Setup Part 2
            if (typeof part2Data !== 'undefined' && part2Data.length > 0) {
                let p2Total = 0;
                part2Data.forEach(q => p2Total += q.items.length);
                state.part2.total = p2Total;
                renderPart2();
            } else {
                questionsPart2.innerHTML = "<p style='text-align:center'>Đang tải dữ liệu câu hỏi...</p>";
            }

            updateUI();
        }

        function updateUI() {
            scorePart1.textContent = state.part1.correct;
            totalPart1.textContent = state.part1.total;
            progressPart1.style.width = state.part1.total ? `${(state.part1.answered / state.part1.total) * 100}%` : '0%';

            scorePart2.textContent = state.part2.score;
            totalPart2.textContent = state.part2.total;
            progressPart2.style.width = state.part2.total ? `${(state.part2.answered / state.part2.total) * 100}%` : '0%';
        }

        window.openTab = function (tabName) {
            const contents = document.getElementsByClassName('tab-content');
            const btns = document.getElementsByClassName('tab-btn');
            for (let c of contents) c.classList.remove('active');
            for (let b of btns) b.classList.remove('active');
            document.getElementById(tabName).classList.add('active');
            const activeBtn = Array.from(btns).find(b => b.onclick.toString().includes(tabName));
            if (activeBtn) activeBtn.classList.add('active');
        }

        function renderPart1() {
            questionsPart1.innerHTML = part1Data.map((q, index) => `
        <div class="question-card" id="q1-${q.id}">
            <div class="question-text">Câu ${q.id}. ${q.q}</div>
            <div class="options-grid">
                ${q.opts.map((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                return `<button class="option-btn" onclick="checkPart1(${q.id}, '${letter}', this)">${opt}</button>`;
            }).join('')}
            </div>
        </div>
    `).join('');
        }

        window.checkPart1 = function (id, selected, btn) {
            const q = part1Data.find(x => x.id === id);
            const parent = btn.parentElement;
            if (parent.dataset.answered) return;
            parent.dataset.answered = "true";

            const buttons = parent.getElementsByClassName('option-btn');
            const correctBtnIndex = q.a.charCodeAt(0) - 65;

            if (selected === q.a) {
                btn.classList.add('correct');
                state.part1.correct++;
                showToast("Chính xác!", "success");
                playRandomSfx(true);
                showFeedbackImage(true);
            } else {
                btn.classList.add('incorrect');
                if (buttons[correctBtnIndex]) buttons[correctBtnIndex].classList.add('correct');
                showToast(`Sai rồi. Đáp án đúng là ${q.a}`, "error");
                playRandomSfx(false);
                showFeedbackImage(false);
            }
            state.part1.answered++;
            updateUI();
            checkCompletion();
        }

        function renderPart2() {
            questionsPart2.innerHTML = part2Data.map(q => `
        <div class="question-card">
            <div class="question-text"><strong>${q.title}</strong></div>
            <p>${q.text}</p>
            <div class="tf-container">
                ${q.items.map(item => `
                    <div class="tf-row" id="p2-item-${q.id}-${item.id}" data-ans="${item.ans}">
                        <div class="tf-statement">${item.text}</div>
                        <div class="tf-options">
                            <button class="tf-btn" onclick="checkPart2('${q.id}', '${item.id}', true, this)">Đúng</button>
                            <button class="tf-btn" onclick="checkPart2('${q.id}', '${item.id}', false, this)">Sai</button>
                        </div>
                        <div class="tf-result"></div>
                    </div>
                    <div class="tf-expl" id="expl-${q.id}-${item.id}" style="display:none; margin-left:10px; font-size:0.9em; color:#666;">
                        ${item.explanation ? `<em>Giải thích: ${item.explanation}</em>` : ''}
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
        }

        window.checkPart2 = function (qId, itemId, userAns, btn) {
            const q = part2Data.find(x => x.id == qId);
            const item = q.items.find(x => x.id == itemId);
            const row = document.getElementById(`p2-item-${qId}-${itemId}`);

            if (row.dataset.answered) return;
            row.dataset.answered = "true";

            const btns = row.getElementsByClassName('tf-btn');
            if (userAns) btn.classList.add('selected-true');
            else btn.classList.add('selected-false');

            const resultDiv = row.querySelector('.tf-result');
            const explDiv = document.getElementById(`expl-${qId}-${itemId}`);

            if (userAns === item.ans) {
                state.part2.score++;
                resultDiv.innerHTML = '<span class="correct-text">✓</span>';
                btn.style.borderColor = 'var(--primary-light)';
                btn.style.borderWidth = '2px';
                playRandomSfx(true);
                showFeedbackImage(true);
            } else {
                resultDiv.innerHTML = '<span class="wrong-text">✕</span>';
                const otherBtn = userAns ? btns[1] : btns[0];
                otherBtn.style.border = '2px solid var(--primary-light)';
                otherBtn.style.color = 'var(--primary-dark)';
                otherBtn.style.fontWeight = 'bold';
                playRandomSfx(false);
                showFeedbackImage(false);
            }

            if (explDiv) explDiv.style.display = 'block';

            state.part2.answered++;
            updateUI();
            checkCompletion();
        }

        function showToast(message, type) {
            const x = document.getElementById("toast");
            x.innerText = message;
            x.className = "toast show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        // Initialize after data load (simulated)
        // setTimeout(init, 100);
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>

</html>
